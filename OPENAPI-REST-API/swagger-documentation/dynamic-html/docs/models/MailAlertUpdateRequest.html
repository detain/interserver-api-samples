
<h2>MailAlertUpdateRequest</h2>
<ul class="parameter">
  <li class="param-required-false">alert_id : Integer
    <br/>Alert ID to update.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">type : String
    <br/>Alert type identifier.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">value : String
    <br/>Alert value or threshold.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">to : String
    <br/>Email address to notify.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">enabled : String
    <br/>Whether the alert is enabled.
  </li>
</ul>
