
<h2>VpsSnapshot</h2>
<ul class="parameter">
  <li class="param-required-false">name : String
    <br/>Snapshot name.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">used : Integer
    <br/>Disk space used by this snapshot in bytes.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">date : Integer
    <br/>Unix timestamp of when the snapshot was created.
  </li>
</ul>
