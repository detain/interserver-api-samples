  /mail/{id}/log:
    get:
      description: |
        Returns a paginated log of emails sent through this mail service, with optional filtering by sender, recipient, date range, and delivery status.

        **Row grouping** is controlled by the `groupby` parameter.  By default (`groupby=recipient`), the response contains one row per delivery attempt — so a single message sent to 4 recipients produces 4 rows, each with its own `recipient`, `delivered`, `response`, and `mxHostname` values.  Set `groupby=message` to collapse to one row per message (delivery fields will reflect one arbitrary recipient).

        **Pagination** is controlled by `skip` and `limit`.  The `total` in the response reflects the row count **after** grouping, so it matches the number of pages you need to fetch.

        **Date filtering** accepts either a Unix timestamp (integer) or a date string parseable by PHP `strtotime()` such as `2024-01-15`, `last monday`, or `2024-01-01 00:00:00`.  Examples: `startDate=1704067200&endDate=1706745599` or `startDate=2024-01-01&endDate=2024-01-31`.

        **Sorting** is controlled by `sort` and `dir`.  Currently the only sort key is `time` (default), which orders by internal row ID.

        **Delivery status** can be filtered with the `delivered` parameter: `delivered=1` returns only successfully delivered messages; `delivered=0` returns messages still in queue or that failed.

        **Address filtering** distinguishes between the SMTP envelope address (`from`, `to`) and message headers (`headerfrom` for the `From:` header, `replyto` for `Reply-To:`). These may differ when a message is sent on behalf of another address.

        The `mailid` parameter corresponds to the `id` field in the returned `MailLogEntry` objects, **not** the `_id` field.  It also matches the transaction ID returned in the `text` field of a successful send response.

        The `messageId` parameter searches the `Message-ID` email header (case-insensitive substring match).
      operationId: viewMailLog
      parameters:
      - description: The mail service ID. Use `mail_id` from `GET /mail`.
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      - description: "The numeric ID of the mail order to filter by.  When omitted,\
          \ logs from the first active mail order are returned.  Obtain valid IDs\
          \ from `GET /mail` or `GET /mail/{id}`."
        example: 2604
        explode: true
        in: query
        name: id
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - description: Filter by the originating IP address from which the message was
          submitted to the relay.  Must be a valid IPv4 or IPv6 address.
        example: 1.2.3.4
        explode: true
        in: query
        name: origin
        required: false
        schema:
          format: ipv4
          type: string
        style: form
      - description: Filter by the MX hostname the relay attempted delivery to.  For
          example `mx.google.com` would return messages destined for Gmail recipients.
          Maps to `mxHostname` in the `MailLogEntry` response.
        example: mx.google.com
        explode: true
        in: query
        name: mx
        required: false
        schema:
          type: string
        style: form
      - description: Filter by SMTP envelope `MAIL FROM` address (exact match).  This
          is the address the relay used for bounce handling and may differ from the
          `From:` message header.  For header-level filtering use `headerfrom`.
        example: me@sender.com
        explode: true
        in: query
        name: from
        required: false
        schema:
          format: email
          type: string
        style: form
      - description: Filter by SMTP envelope `RCPT TO` address (exact match).  This
          is the delivery address used by the relay and may differ from the `To:`
          header when BCC recipients are involved.
        example: you@receiver.com
        explode: true
        in: query
        name: to
        required: false
        schema:
          format: email
          type: string
        style: form
      - description: Filter by email `Subject` header (exact match).  MIME-encoded
          subjects are decoded automatically in the response.
        example: Your order has shipped
        explode: true
        in: query
        name: subject
        required: false
        schema:
          type: string
        style: form
      - description: Filter by the relay-assigned mail ID string (exact match).  This
          corresponds to the `id` field in `MailLogEntry` and to the `text` value
          returned by the sending endpoints on success.  Format is an 18-19 character
          hexadecimal string such as `185997065c60008840`.
        example: 185997065c60008840
        explode: true
        in: query
        name: mailid
        required: false
        schema:
          maxLength: 19
          minLength: 18
          type: string
        style: form
      - description: Filter by the `Message-ID` email header using a substring (case-insensitive)
          match. The `Message-ID` is assigned by the sending mail client and is visible
          in the `messageId` field of `MailLogEntry`.
        example: <abc123@yourdomain.com>
        explode: true
        in: query
        name: messageId
        required: false
        schema:
          type: string
        style: form
      - description: Filter by the `Reply-To` message header address (exact match).  Only
          returns messages where this header was explicitly set.
        example: replies@sender.com
        explode: true
        in: query
        name: replyto
        required: false
        schema:
          format: email
          type: string
        style: form
      - description: Filter by the `From` message header address (exact match).  This
          is the human-visible sender address and may differ from the SMTP envelope
          `from` parameter when sending on behalf of another address.
        example: newsletter@sender.com
        explode: true
        in: query
        name: headerfrom
        required: false
        schema:
          format: email
          type: string
        style: form
      - description: "Filter by delivery status.  `1` returns only messages that were\
          \ successfully delivered to the destination MX.  `0` returns messages that\
          \ are still queued, deferred, or failed.  Omit to return all messages regardless\
          \ of delivery status."
        example: 1
        explode: true
        in: query
        name: delivered
        required: false
        schema:
          enum:
          - 0
          - 1
          title: DeliveredStatus
          type: integer
        style: form
      - description: Number of records to skip for pagination.  Use in combination
          with `limit` to page through large result sets.  Defaults to `0` (no skip).
        example: 0
        explode: true
        in: query
        name: skip
        required: false
        schema:
          default: 0
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: Maximum number of records to return per page.  Defaults to `100`.
          Maximum allowed value is `10000`.  The response also includes a `total`
          field with the full matched count so you can calculate the number of pages.
        example: 100
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          format: int32
          maximum: 10000
          minimum: 1
          type: integer
        style: form
      - description: Earliest date to include.  Accepts either a Unix timestamp (integer
          seconds since epoch) or a date string parseable by `strtotime()` such as
          `2024-01-15` or `last monday`.  Messages with a `time` value **greater than
          or equal to** this value will be included.
        example: 1641781008
        explode: true
        in: query
        name: startDate
        required: false
        schema:
          $ref: "#/components/schemas/viewMailLog_startDate_parameter"
        style: form
      - description: Latest date to include.  Accepts either a Unix timestamp (integer
          seconds since epoch) or a date string parseable by `strtotime()` such as
          `2024-01-31` or `yesterday`. Messages with a `time` value **less than or
          equal to** this value will be included.
        example: 1673317008
        explode: true
        in: query
        name: endDate
        required: false
        schema:
          $ref: "#/components/schemas/viewMailLog_startDate_parameter"
        style: form
      - description: Field to sort results by.  Currently only `time` is supported
          (sorts by internal row ID which corresponds to chronological order).
        example: time
        explode: true
        in: query
        name: sort
        required: false
        schema:
          default: time
          enum:
          - time
          type: string
        style: form
      - description: "Sort direction.  `desc` returns newest first (default), `asc`\
          \ returns oldest first."
        example: desc
        explode: true
        in: query
        name: dir
        required: false
        schema:
          default: desc
          enum:
          - asc
          - desc
          type: string
        style: form
      - description: "Controls how results are grouped.  `recipient` (default) returns\
          \ one row per delivery attempt — a message sent to 4 recipients produces\
          \ 4 rows, each with its own `recipient`, `delivered`, `response`, and delivery\
          \ metadata.  `message` collapses to one row per unique message ID; delivery-level\
          \ fields will reflect one arbitrary recipient per message.  The `total`\
          \ count in the response matches the grouping mode."
        example: recipient
        explode: true
        in: query
        name: groupby
        required: false
        schema:
          default: recipient
          enum:
          - message
          - recipient
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                MailLogRecipientExample:
                  summary: groupby=recipient (default) - one row per delivery attempt
                  value:
                    total: 4
                    skip: 0
                    limit: 100
                    emails:
                    - _id: 103172
                      id: 17c7eda538e0005d03
                      from: person@mysite.com
                      to: client@isp.com
                      subject: sell 0.005 shares
                      messageId: <vmiLEebsuCbSpUxD7oN3REpaN4VbN6BrdCAbNKIrdAo@relay0.mailbaby.net>
                      created: 2021-10-14 08:50:10
                      time: 1634215809
                      user: mb5658
                      transtype: ESMTPSA
                      origin: 199.231.189.154
                      interface: feeder
                      sendingZone: interserver
                      bodySize: 63
                      seq: 1
                      delivered: 1
                      code: 250
                      recipient: client@isp.com
                      domain: interserver.net
                      locked: 1
                      lockTime: "1634215818533"
                      assigned: relay1
                      queued: 2021-10-14T12:50:15.487Z
                      mxHostname: mx.j.is.cc
                      response: 250 2.0.0 Ok queued as C91D83E128C
                MailLogMessageExample:
                  summary: groupby=message - one row per message
                  value:
                    total: 1
                    skip: 0
                    limit: 100
                    emails:
                    - _id: 103172
                      id: 17c7eda538e0005d03
                      from: person@mysite.com
                      to: client@isp.com
                      subject: sell 0.005 shares
                      messageId: <vmiLEebsuCbSpUxD7oN3REpaN4VbN6BrdCAbNKIrdAo@relay0.mailbaby.net>
                      created: 2021-10-14 08:50:10
                      time: 1634215809
                      user: mb5658
                      transtype: ESMTPSA
                      origin: 199.231.189.154
                      interface: feeder
                      sendingZone: interserver
                      bodySize: 63
                      seq: 1
                      delivered: 1
                      code: 250
                      recipient: client@isp.com
                      domain: interserver.net
                      locked: 1
                      lockTime: "1634215818533"
                      assigned: relay1
                      queued: 2021-10-14T12:50:15.487Z
                      mxHostname: mx.j.is.cc
                      response: 250 2.0.0 Ok queued as C91D83E128C
              schema:
                $ref: "#/components/schemas/MailLog"
          description: Paginated list of mail log entries matching the specified filters.
          links:
            delistSenderBlock:
              description: A `from` address returned in the log can be passed as `email`
                to `POST /mail/blocks/delete` to remove a block on that sender.
              operationId: delistBlock
              parameters:
                email: $response.body#/emails/0/from
        "400":
          description: bad input parameter
      summary: View Mail Log
      tags:
      - Mail
  /vps/{id}/restore:
