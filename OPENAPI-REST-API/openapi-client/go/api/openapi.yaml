      - config_ids
      - config_li
      - country
      - cpu
      - cpu_li
      - currency
      - form_values
      - frequency
      - step
      type: object
    FormValues:
      description: Currently selected configuration option IDs for a server order
        form.
      properties:
        memory:
          description: Selected memory option ID.
          type: integer
        bandwidth:
          description: Selected bandwidth option ID.
          type: integer
        ips:
          description: Selected IP block option ID.
          type: integer
        os:
          description: Selected operating system option ID.
          type: integer
        cp:
          description: Selected control panel option ID.
          type: integer
        raid:
          description: Selected RAID option ID.
          type: integer
        hd:
          description: Selected hard drive option ID.
          type: integer
        region:
          description: Selected datacenter region ID.
          type: integer
      type: object
    ConfigIds:
      description: Internal configuration IDs mapped from the selected form values
        for a server order.
      properties:
        memory:
          description: Configuration ID for the selected memory option.
          type: integer
        hd:
          description: Configuration ID for the selected hard drive option.
          type: integer
        bandwidth:
          description: Configuration ID for the selected bandwidth option.
          type: integer
        ips:
          description: Configuration ID for the selected IP block option.
          type: integer
        os:
          description: Configuration ID for the selected operating system.
          type: integer
        cp:
          description: Configuration ID for the selected control panel.
          type: integer
        raid:
          description: Configuration ID for the selected RAID option.
          type: integer
      type: object
    Cpu:
      description: A CPU option available for dedicated server ordering.
      properties:
        id:
          type: integer
        short_desc:
          type: string
        long_desc:
          type: string
        type:
          type: string
        speed:
          type: string
        num_cores:
          type: string
        num_cpus:
          type: string
        benchmark:
          type: string
        monthly_price:
          type: number
        monthly_price_display:
          type: string
        max_ram:
          type: string
        min_ram:
          type: string
        max_lff:
          type: string
        max_sff:
          type: string
        max_nve:
          type: string
        visible:
          type: string
        active:
          type: string
      type: object
