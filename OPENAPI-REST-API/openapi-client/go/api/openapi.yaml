  /domains/{id}/nameservers:
    delete:
      description: "Removes a registered nameserver (glue record) from the domain.\
        \ Specify the zero-based `index` of the nameserver to remove as returned by\
        \ `GET /domains/{id}/nameservers`."
      operationId: deleteDomainNameserver
      parameters:
      - description: The domain service ID. Use `domain_id` from `GET /domains`.
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      - description: "The index of the registered nameserver from the registered nameservers\
          \ list to delete.\r\n"
        explode: true
        in: query
        name: index
        required: true
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: Response with a text message field.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Delete Registered Nameserver
      tags:
      - Domains
    get:
      description: "Returns the registered nameserver hosts and glue IP addresses\
        \ currently configured at the registrar. Use the returned list when adding,\
        \ updating, or deleting individual nameserver records."
      operationId: getDomainNameservers
      parameters:
      - description: The domain service ID. Use `domain_id` from `GET /domains`.
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainNameserverGetResponse"
          description: Domain registered nameservers list response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: List Registered Nameservers
      tags:
      - Domains
    post:
      description: "Adds a new registered nameserver (glue record) for the domain\
        \ using the supplied hostname and IP address. Use `GET /domains/{id}/nameservers`\
        \ to confirm that the new entry exists."
      operationId: addDomainNameserver
      parameters:
      - description: The domain service ID. Use `domain_id` from `GET /domains`.
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainNameserverPostRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DomainNameserverPostRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: Response with a text message field.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Add Registered Nameserver
      tags:
      - Domains
    put:
      description: Replaces the full nameserver assignment for the domain with the
        provided list. This is the primary method for changing which authoritative
        nameservers the domain delegates to.
      operationId: updateDomainNameservers
      parameters:
      - description: The domain service ID. Use `domain_id` from `GET /domains`.
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainNameserverPutRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DomainNameserverPutRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: Response with a text message field.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Replace Nameserver Set
      tags:
      - Domains
