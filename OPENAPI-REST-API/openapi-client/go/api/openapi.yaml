tags:
- description: "Endpoints that do not require authentication. Use these to check API\
    \ availability, look up reference data (countries, currencies, timezones), and\
    \ authenticate."
  name: Public
- description: "Manage your account profile, contact information, security settings,\
    \ API keys, SSH keys, two-factor authentication, and IP access restrictions."
  name: Account
- description: "Invoices, shopping cart, prepay balances, credit cards, and payment\
    \ processing. Use `/pay/{method}/{invoices}` to complete payment for outstanding\
    \ invoices."
  name: Billing
- description: "Cloud backup storage services. Order, view, and manage backup storage\
    \ quotas and credentials."
  name: Backups
- description: "Manage DNS domains and records hosted on InterServer's nameservers.\
    \ Create domains, add/update/delete A, AAAA, CNAME, MX, TXT, and other record\
    \ types."
  name: DNS
- description: "Domain registration, transfers, renewals, WHOIS, nameserver management,\
    \ and DNSSEC configuration."
  name: Domains
- description: Floating IP services that provide portable IP addresses which can be
    reassigned between servers for high availability and failover.
  name: Floating_IPs
- description: "Software license provisioning for control panels (cPanel, Plesk, DirectAdmin)\
    \ and other licensed software. Order, manage, and change IP assignments."
  name: Licenses
- description: "Mail Baby email delivery services. Order, manage, view logs, configure\
    \ alerts and deny rules, and monitor deliverability."
  name: Mail
- description: "Rapid Deploy Servers (QuickServers) — pre-configured dedicated servers\
    \ available for fast provisioning with OS reinstall, backup, and VNC capabilities."
  name: QuickServers
- description: "Dedicated server ordering and management. Configure custom hardware,\
    \ view IPMI information, and manage server lifecycle."
  name: Servers
- description: "SSL/TLS certificate provisioning and management. Order, renew, and\
    \ manage certificates for securing your domains."
  name: SSL-Certificates
- description: "Virtual Private Server management. Order, configure, backup, restore,\
    \ reinstall, and control VPS instances with full root access."
  name: VPS
- description: "Shared and reseller web hosting packages. Order, manage, and access\
    \ hosting control panels, backups, and reverse DNS."
  name: Webhosting
- description: "Support ticket system. Create new tickets, reply to existing ones,\
    \ view ticket history, and close resolved issues."
  name: Tickets
- description: "DDoS protection and IP scrubbing services. Manage protected IPs, configure\
    \ firewall rules, geographic filters, and view traffic logs."
  name: Scrub Ips
paths:
  /account:
    description: |
      This endpoint allows you to manage various user details, including contact information and account security.

      - Use the `GET` method to retrieve your account information.
      - Use the `POST` method to update your stored contact and billing information.
    get:
      description: "Returns the full account profile including contact information,\
        \ billing address, and security settings. Use this to populate account management\
        \ forms or verify account state before making changes with `POST /account`."
      operationId: getAccountInfo
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfo"
          description: Your account information.
          links:
            UpdateAccountInfo:
              description: Use the returned account data to pre-fill an update form
                and submit changes via POST /account.
              operationId: updateAccountInfo
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Retrieve Account Details
      tags:
      - Account
    post:
      description: Updates the stored contact and billing information on your account.
        Submit only the fields you want to change. Validation errors are returned
        as a 422 response with field-level messages.
      operationId: updateAccountInfo
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AccountInfoPost"
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInfoPost"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTextResponse"
          description: A response indicating the operation completed successfully
            with a text message.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
        "422":
          content:
            application/json:
              examples:
                InvalidTimeZone:
                  value:
                    message: Invalid Time Zone
                MissingRequiredFields:
                  value:
                    message: "fname, lname cannot be empty!"
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: Validation error while updating account data.
      summary: Update Account Information
      tags:
      - Account
    summary: User Account Information and Management
  /account/2fa:
    delete:
      description: "Disables two-factor authentication on the account. After disabling,\
        \ the account will only require password-based authentication."
      operationId: deleteAccountTfa
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTextResponse"
          description: A response indicating the operation completed successfully
            with a text message.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Disable Two-Factor Authentication
      tags:
      - Account
    get:
      description: "Returns the TOTP secret key needed to configure a two-factor authentication\
        \ app (e.g. Google Authenticator). Present the `2fa_google_key` as a QR code\
        \ or display the `2fa_google_split` value for manual entry. After setup, verify\
        \ with `POST /account/2fa`."
      operationId: getAccountTfaSetup
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountTfaSetup_200_response"
          description: Two-factor authentication setup data.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Get Two-Factor Setup Data
      tags:
      - Account
    post:
      description: Verifies the TOTP code from your authenticator app and enables
        two-factor authentication on the account. Use `GET /account/2fa` first to
        retrieve the secret key for app setup.
      operationId: updateAccountTfa
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/updateAccountTfa_request"
          application/json:
            schema:
              $ref: "#/components/schemas/updateAccountTfa_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTextResponse"
          description: A response indicating the operation completed successfully
            with a text message.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
        "422":
          content:
            application/json:
              examples:
                InvalidCode:
                  value:
                    message: Invalid Code
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: Provided two-factor verification code was invalid.
      summary: Enable Two-Factor Authentication
      tags:
      - Account
  /account/apikey:
    post:
      description: Generates a new API key for the account. The previous key is immediately
        invalidated. Store the new key securely as it cannot be retrieved later.
      operationId: updateAccountApiKey
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTextResponse"
          description: A response indicating the operation completed successfully
            with a text message.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Generate New API Key
      tags:
      - Account
  /account/creditcards:
    post:
      description: Adds a new credit card to the account for billing. Card details
        are validated and stored securely. The card may require verification before
        it can be used as a payment method.
      operationId: addAccountCreditCard
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/BillingAddCcRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/BillingAddCcRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTextResponse"
          description: A response indicating the operation completed successfully
            with a text message.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Add Credit Card to Account
      tags:
      - Billing
  /account/creditcards/{id}:
    delete:
      description: "Removes a credit card from the account. If this is the default\
        \ payment method, select a new default via `/billing/payment_method` afterward."
      operationId: deleteAccountCreditCard
      parameters:
      - description: The credit card ID. Use the card ID returned from `POST /account/creditcards`
          or listed in `/billing/creditcards`.
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                StringResponseExample:
                  value: '"You were successfull."'
              schema:
                type: string
          description: Simple string response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Remove Credit Card
      tags:
      - Billing
    post:
      description: Updates an existing credit card on the account. Use this to refresh
        stored card metadata such as expiration date or billing address.
      operationId: updateAccountCreditCard
      parameters:
      - description: The credit card ID. Use the card ID returned from `POST /account/creditcards`
          or listed in `/billing/creditcards`.
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              examples:
                StringResponseExample:
                  value: '"You were successfull."'
              schema:
                type: string
          description: Simple string response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Update Credit Card
      tags:
      - Billing
  /account/features:
    post:
      description: "Updates account-level feature flags that control service capabilities.\
        \ These flags can disable password reset, OS reinstall, or other potentially\
        \ destructive operations across your services. Changes take effect immediately."
      operationId: updateAccountFeatures
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AccountFeatures"
          application/json:
            schema:
              $ref: "#/components/schemas/AccountFeatures"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTextResponse"
          description: A response indicating the operation completed successfully
            with a text message.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
        "422":
          content:
            application/json:
              examples:
                NoChanges:
                  value:
                    message: Nothing to update
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: Request was valid but did not contain updatable values.
      summary: Update Account Feature Flags
      tags:
      - Account
  /account/iplimits:
    patch:
      description: "Removes an IP address range from the account's access restriction\
        \ list. If this is the last range, IP limiting is effectively disabled and\
        \ the account becomes accessible from any IP address."
      operationId: deleteIpLimit
      requestBody:
        content:
          application/json: {}
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericResponse"
          description: IP Range removed.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Remove IP Access Restriction
      tags:
      - Account
    post:
      description: "Adds an IP address range to the account's access restriction list.\
        \ Once IP limiting is active, only requests originating from allowed ranges\
        \ can access the account. Provide the start and end of the range in dotted-quad\
        \ notation."
      operationId: updateAccountIpLimits
      requestBody:
        content:
          multipart/form-data:
            examples:
              IpLimitRangeFormExample:
                value:
                  start: 1.2.3.0
                  end: 1.2.3.255
            schema:
              $ref: "#/components/schemas/IpLimitRange"
          application/json:
            examples:
              IpLimitRangeJsonExample:
                value:
                  start: 1.2.3.0
                  end: 1.2.3.255
            schema:
              $ref: "#/components/schemas/IpLimitRange"
        description: The lower and upper bounds of an ip range.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTextResponse"
          description: A response indicating the operation completed successfully
            with a text message.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
        "422":
          content:
            application/json:
              examples:
                InvalidIp:
                  value:
                    message: Invalid IP Address
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: IP limit payload contains an invalid address.
      summary: Add IP Access Restriction
      tags:
      - Account
  /account/oauth/{name}:
    delete:
      description: "Unlinks a third-party OAuth provider from the account. After unlinking,\
        \ that provider can no longer be used for login."
      operationId: deleteAccountOauthName
      parameters:
      - explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTextResponse"
          description: A response indicating the operation completed successfully
            with a text message.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Unlink OAuth Account
      tags:
      - Account
  /account/oauth/{name}/logout:
    get:
      description: Logs out of the specified OAuth provider session.
      operationId: logoutAccountOauth
      parameters:
      - explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTextResponse"
          description: A response indicating the operation completed successfully
            with a text message.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Logout of OAuth
      tags:
      - Account
  /account/password:
    post:
      description: "Changes the account login password. The current password must\
        \ be provided for verification. After a successful change, existing API keys\
        \ remain valid but active sessions may require re-authentication."
      operationId: updateAccountPassword
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PasswordRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: Response with a text message field.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Change Account Password
      tags:
      - Account
  /account/sshkey:
    post:
      description: Updates the SSH public key stored on the account. This key can
        be automatically installed on new VPS and server orders.
      operationId: updateAccountSshKey
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AccountSshKey"
          application/json:
            schema:
              $ref: "#/components/schemas/AccountSshKey"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessTextResponse"
          description: A response indicating the operation completed successfully
            with a text message.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Update SSH Keys
      tags:
      - Account
  /account/username:
    post:
      description: "Changes the login username for the account. The new username must\
        \ be unique across all accounts. After changing, use the new username for\
        \ all future logins."
      operationId: changeAccountUsername
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: Response with a text message field.
        "400":
          content:
            application/json:
              examples:
                InvalidTimezone:
                  value:
                    code: 422
                    message: Invalid timezone
                MissingCaptcha:
                  value:
                    code: 422
                    message: missing captcha
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: The specified resource was not found
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Change Account Username
      tags:
      - Account
  /affiliate/banners:
    get:
      description: "Returns the catalog of available affiliate banner images with\
        \ their dimensions. Use these assets to build marketing creatives for your\
        \ affiliate campaigns. Each banner includes the image filename, width, and\
        \ height for layout purposes."
      operationId: getAffiliateBanners
      responses:
        "200":
          content:
            application/json:
              examples:
                AffiliateBannerExample:
                  value:
                  - image: 12946798.gif
                    width: "125"
                    height: "125"
                  - image: 12946800.gif
                    width: "160"
                    height: "90"
                  - image: 12946802.gif
                    width: "160"
                    height: "190"
                  - image: 12946806.gif
                    width: "200"
                    height: "200"
                  - image: 12946808.gif
                    width: "250"
                    height: "250"
                  - image: 12946811.gif
                    width: "300"
                    height: "250"
              schema:
                items:
                  $ref: "#/components/schemas/AffiliateBannerRow"
                type: array
          description: Affiliate Banners Array
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: List Affiliate Banner Assets
      tags:
      - Billing
  /affiliate/landing_pg:
    post:
      description: "Updates the affiliate landing page configuration, including the\
        \ title, description, and coupon code. Visitors who arrive through your affiliate\
        \ link see this customized page. Changes are published immediately."
      operationId: updateAffiliateLandingPage
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AffiliateDockSetup"
          application/json:
            schema:
              $ref: "#/components/schemas/AffiliateDockSetup"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: Response with a text message field.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Configure Affiliate Landing Page
      tags:
      - Billing
  /affiliate/dock_setup:
    post:
      description: Updates the affiliate dock settings including the referral coupon
        and marketing copy. The dock is the branded landing page shown to visitors
        arriving via your affiliate link. Use this to customize the coupon code and
        promotional text.
      operationId: updateAffiliateDockSetup
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AffiliateDockSetup"
          application/json:
            schema:
              $ref: "#/components/schemas/AffiliateDockSetup"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: Response with a text message field.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Configure Affiliate Dock Settings
      tags:
      - Billing
  /affiliate/payment_setup:
    post:
      description: "Updates how you receive affiliate commission payouts. Choose between\
        \ prepay credit applied to your account balance or PayPal disbursement. When\
        \ selecting PayPal, provide the email address linked to your PayPal account."
      operationId: updateAffiliatePaymentSetup
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AffiliatePaymentSetup"
          application/json:
            schema:
              $ref: "#/components/schemas/AffiliatePaymentSetup"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: Response with a text message field.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Configure Affiliate Payout Preferences
      tags:
      - Billing
  /affiliate/rich_report:
    get:
      description: "Returns a detailed affiliate performance report with commission\
        \ totals, conversion rates, and traffic summary. Use this for a comprehensive\
        \ overview of your affiliate program performance in a single request."
      operationId: getAffiliateRichReport
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextResponse"
          description: Response with a text message field.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Get Affiliate Performance Report
      tags:
      - Billing
  /affiliate/sales_graph:
    get:
      description: Returns time-series sales data for the requested number of days.
        Use this to render sales trend charts in an affiliate dashboard. Each data
        point represents aggregated sales for a time period.
      operationId: getAffiliateSalesGraph
      parameters:
      - description: Number of days of sales history to include in the graph data.
          Determines the time window for the returned data points.
        explode: true
        in: query
        name: days
        required: false
        schema:
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusMonthlyBreakdown"
          description: Affiliate sales graph data broken down by time period.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      summary: Get Affiliate Sales Graph Data
