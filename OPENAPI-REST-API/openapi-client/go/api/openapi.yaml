      parameters:
      - description: VPS ID number
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/RestoreRequest"
        description: VPS Restore request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueResponse"
          description: Response message from sending a service queue.
        "400":
