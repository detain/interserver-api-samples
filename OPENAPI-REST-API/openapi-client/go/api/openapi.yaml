    MailLog:
      description: "Paginated mail log response.  Contains the full matched count\
        \ (`total`) plus a page of `MailLogEntry` records.  The `total` reflects the\
        \ grouping mode: with `groupby=recipient` it counts delivery attempts, with\
        \ `groupby=message` it counts unique messages."
      example:
        total: 1
        skip: 0
        limit: 100
        emails:
        - _id: 103172
          id: 17c7eda538e0005d03
          from: person@mysite.com
          to: client@isp.com
          subject: sell 0.005 shares
          messageId: <vmiLEebsuCbSpUxD7oN3REpaN4VbN6BrdCAbNKIrdAo@relay0.mailbaby.net>
          created: 2021-10-14 08:50:10
          time: 1634215809
          user: mb5658
          transtype: ESMTPSA
          origin: 199.231.189.154
          interface: feeder
          sendingZone: interserver
          bodySize: 63
          seq: 1
          delivered: 1
          code: 250
          recipient: client@isp.com
          domain: interserver.net
          locked: 1
          lockTime: "1634215818533"
          assigned: relay1
          queued: 2021-10-14T12:50:15.487Z
          mxHostname: mx.j.is.cc
          response: 250 2.0.0 Ok queued as C91D83E128C
      properties:
        total:
          description: "Total number of log entries that match the supplied filters,\
            \ regardless of `skip` and `limit`.  Reflects the `groupby` mode."
          example: 10234
          type: integer
        skip:
          description: The `skip` value used for this page (echoed from the request).
          example: 0
          type: integer
        limit:
          description: The `limit` value used for this page (echoed from the request).
          example: 100
          type: integer
        emails:
          example:
          - _id: 103172
            id: 17c7eda538e0005d03
            from: person@mysite.com
            to: client@isp.com
            subject: sell 0.005 shares
            messageId: <vmiLEebsuCbSpUxD7oN3REpaN4VbN6BrdCAbNKIrdAo@relay0.mailbaby.net>
            created: 2021-10-14 08:50:10
            time: 1634215809
            user: mb5658
            transtype: ESMTPSA
            origin: 199.231.189.154
            interface: feeder
            sendingZone: interserver
            bodySize: 63
            seq: 1
            delivered: 1
            code: 250
            recipient: client@isp.com
            domain: interserver.net
            locked: 1
            lockTime: "1634215818533"
            assigned: relay1
            queued: 2021-10-14T12:50:15.487Z
            mxHostname: mx.j.is.cc
            response: 250 2.0.0 Ok queued as C91D83E128C
          items:
            $ref: "#/components/schemas/MailLogEntry"
          type: array
      required:
      - emails
      - limit
      - skip
      - total
      title: MailLog
      type: object
    MailLogEntry:
      description: "A single email record in the mail log.  Combines data from the\
        \ message store (envelope metadata), the queue release table (delivery status\
        \ and response), and the sender delivery table (MX routing details).  When\
        \ `groupby=recipient` each row represents one delivery attempt; when `groupby=message`\
        \ delivery fields reflect one arbitrary recipient."
      example:
        _id: 103172
        id: 17c7eda538e0005d03
        from: person@mysite.com
        to: client@isp.com
        subject: sell 0.005 shares
        messageId: <vmiLEebsuCbSpUxD7oN3REpaN4VbN6BrdCAbNKIrdAo@relay0.mailbaby.net>
        created: 2021-10-14 08:50:10
        time: 1634215809
        user: mb5658
        transtype: ESMTPSA
        origin: 199.231.189.154
        interface: feeder
        sendingZone: interserver
        bodySize: 63
        seq: 1
        delivered: 1
        code: 250
        recipient: client@isp.com
        domain: interserver.net
        locked: 1
        lockTime: "1634215818533"
        assigned: relay1
        queued: 2021-10-14T12:50:15.487Z
        mxHostname: mx.j.is.cc
        response: 250 2.0.0 Ok queued as C91D83E128C
      properties:
        _id:
          description: Internal auto-increment database row ID.
          example: 103172
          type: integer
          x-codegen-property-name: internalId
        id:
          description: The relay-assigned mail ID (18-19 hex characters).  Matches
            the `mailid` filter parameter and the `text` value returned by send endpoints.
          example: 17c7eda538e0005d03
          type: string
        from:
          description: SMTP envelope `MAIL FROM` address.
          example: person@mysite.com
          type: string
        to:
          description: SMTP envelope `RCPT TO` address.
          example: client@isp.com
          type: string
        subject:
          description: "The `Subject` header value.  MIME-encoded subjects (UTF-8,\
            \ ISO-8859, US-ASCII) are automatically decoded."
          example: sell 0.005 shares
          nullable: true
          type: string
        messageId:
          description: The `Message-ID` header value.  Can be used with the `messageId`
            filter for subsequent lookups.
          example: <vmiLEebsuCbSpUxD7oN3REpaN4VbN6BrdCAbNKIrdAo@relay0.mailbaby.net>
          nullable: true
          type: string
        created:
          description: Human-readable creation timestamp in `YYYY-MM-DD HH:MM:SS`
            format.
          example: 2021-10-14 08:50:10
          type: string
        time:
          description: Unix timestamp of message acceptance.  Corresponds to the `startDate`
            and `endDate` filter parameters.
          example: 1634215809
          type: integer
        user:
          description: The SMTP AUTH username used to submit the message (e.g. `mb5658`).
          example: mb5658
          type: string
        transtype:
          description: SMTP transaction type negotiated with the relay.
          example: ESMTPSA
          type: string
        origin:
          description: IP address of the client that submitted the message to the
            relay.
          example: 199.231.189.154
          type: string
        interface:
          description: Relay interface name that accepted the message.
          example: feeder
          type: string
        sendingZone:
          description: The sending zone assigned by the relay for outbound delivery.
          example: interserver
          nullable: true
          type: string
        bodySize:
          description: Size of the message body in bytes.
          example: 63
          nullable: true
          type: integer
        seq:
          description: Sequence index of this recipient in a multi-recipient message.
            Starts at 1.
          example: 1
          nullable: true
          type: integer
        delivered:
          description: "Delivery status flag.  `1` = successfully delivered to destination\
            \ MX. `0` = queued, deferred, or failed.  `null` = delivery not yet attempted."
          example: 1
          nullable: true
          type: integer
        code:
          description: The SMTP response code from the destination MX server (e.g.
            `250`).
          example: 250
          nullable: true
          type: integer
        recipient:
          description: The specific recipient address this delivery record is for.
          example: client@isp.com
          nullable: true
          type: string
        response:
          description: The full SMTP response string received from the destination
            MX server.
          example: 250 2.0.0 Ok queued as C91D83E128C
          nullable: true
          type: string
        domain:
          description: The destination domain for this delivery attempt.
          example: interserver.net
          nullable: true
          type: string
        locked:
          description: Whether the queue entry is currently locked for delivery processing.
          example: 1
          nullable: true
          type: integer
        lockTime:
          description: Millisecond-precision timestamp of the last queue lock acquisition.
          example: "1634215818533"
          nullable: true
          type: string
        assigned:
          description: The relay server node assigned to deliver this message.
          example: relay1
          nullable: true
          type: string
        queued:
          description: ISO 8601 timestamp when the message was placed into the delivery
            queue.
          example: 2021-10-14T12:50:15.487Z
          nullable: true
          type: string
        mxHostname:
          description: The MX hostname the relay connected to for delivery.  Corresponds
            to the `mx` filter parameter.
          example: mx.j.is.cc
          nullable: true
          type: string
      required:
      - _id
      - created
      - from
      - id
      - interface
      - origin
      - time
      - to
      - transtype
      - user
      title: MailLogEntry
      type: object
