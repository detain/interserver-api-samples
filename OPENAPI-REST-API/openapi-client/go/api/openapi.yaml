  /oauth:
    description: "Authenticate using third-party OAuth providers such as Google. Use\
      \ GET to initiate the OAuth redirect, POST to handle the callback, and PATCH\
      \ to complete two-factor verification if required."
    get:
      description: "Returns the OAuth redirect URL for the specified provider. Redirect\
        \ the user to this URL to begin the OAuth authentication flow. After the user\
        \ authorizes, the provider will redirect back to your callback endpoint where\
        \ you should call `POST /oauth`."
      operationId: getOauthRedirect
      parameters:
      - description: The OAuth provider name (e.g. `Google`).
        explode: true
        in: query
        name: provider
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getOauthRedirect_200_response"
          description: OAuth redirect URL for the requested provider.
          links:
            postOauthCallback:
              description: "After the user completes OAuth authorization at the redirect\
                \ URL, call `POST /oauth` with the provider to handle the callback."
              operationId: postOauthCallback
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      security:
      - {}
      summary: Get OAuth Redirect URL
      tags:
      - Public
    patch:
      description: "Completes the OAuth login by verifying a two-factor authentication\
        \ code. Use the `account_id` returned by `POST /oauth` when the response contained\
        \ `error_code: \"2fa_required\"`."
      operationId: patchOauthTwoFactor
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/patchOauthTwoFactor_request"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/patchOauthTwoFactor_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/patchOauthTwoFactor_200_response"
          description: OAuth 2FA verification result.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      security:
      - {}
      summary: Complete OAuth Two-Factor Verification
      tags:
      - Public
    post:
      description: "Handles the OAuth callback after the user authorizes with the\
        \ provider. Returns the login status. If the account has two-factor authentication\
        \ enabled, the response will include `error_code: \"2fa_required\"` and an\
        \ `account_id`; use `PATCH /oauth` with the 2FA code and account ID to complete\
        \ login."
      operationId: postOauthCallback
      parameters:
      - description: The OAuth provider name (e.g. `Google`).
        explode: true
        in: query
        name: provider
        required: true
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/postOauthCallback_request"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/postOauthCallback_request"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/postOauthCallback_200_response"
          description: OAuth callback result.
          links:
            patchOauthTwoFactor:
              description: "When the response contains `error_code: \"2fa_required\"\
                `, use the returned `account_id` with `PATCH /oauth` to complete two-factor\
                \ verification."
              operationId: patchOauthTwoFactor
              parameters:
                account_id: $response.body#/account_id
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getAccountInfo_401_response"
          description: Unauthorized
      security:
      - {}
      summary: OAuth Callback
      tags:
      - Public
    summary: OAuth Authentication
  /login:
    description: Submit your login credentials to generate a session id which can
      be used for validating requests.
    get:
      description: Gets the various pieces of information useful for generating a
        login page.
      operationId: getLoginInfo
      responses:
        "200":
          content:
            application/json:
              examples:
                LoginInfoExample:
                  value:
                    logo: //my.interserver.net/images/logos/mystaging.png
                    captcha: "data:image/jpeg;base64,/9j/"
                    language: en-US
                    counts:
                      vps: 290201
                      websites: 205172
                      servers: 27940
              schema:
                $ref: "#/components/schemas/LoginInfo"
          description: Various pieces of information useful for rendering a login
            page.
        "403":
          content:
            application/json:
              examples:
                MissingTwoFactorCode:
                  value:
                    message: missing 2fa
                    field: tfa
                InvalidTwoFactorCode:
                  value:
                    message: invalid 2fa
                    field: tfa
                MissingCaptcha:
                  value:
                    message: missing captcha
                    field: captcha
                TooManyVerificationAttempts:
                  value:
                    message: "max tries treached on code, sending new one, submit\
                      \ again"
                    field: verify
              schema:
                $ref: "#/components/schemas/LoginErrorResponse"
          description: Error response to a login request.
      security:
      - {}
      summary: Get Login Info
      tags:
      - Public
    post:
      description: "Authenticates using the provided login credentials and returns\
        \ a session token. Include the returned session ID in the `sessionid` header\
        \ on subsequent requests. If authentication fails, a `402` error is returned."
      operationId: submitLogin
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/LoginSubmissionExample"
          application/json:
            examples:
              LoginSubmissionExampleExample:
                value:
                  login: user@domain.com
                  passwd: mypassword
                  remember: "true"
                  g-recaptcha-response:
                    __v_isShallow: false
                    dep:
                      w: 0
                      "n": 0
                    __v_isRef: true
                    _rawValue: zzzzz
                    _value: zzzzz
            schema:
              $ref: "#/components/schemas/LoginSubmissionExample"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
          description: Successful login response containing the session token.
          links:
            getAccountInfo:
              description: "After a successful login, use the session token to fetch\
                \ account details via `GET /account`."
              operationId: getAccountInfo
        "402":
          content:
            application/json:
              examples:
                MissingTwoFactorCode:
                  value:
                    message: missing 2fa
                    field: tfa
                InvalidTwoFactorCode:
                  value:
                    message: invalid 2fa
                    field: tfa
                MissingCaptcha:
                  value:
                    message: missing captcha
                    field: captcha
                TooManyVerificationAttempts:
                  value:
                    message: "max tries treached on code, sending new one, submit\
                      \ again"
                    field: verify
              schema:
                $ref: "#/components/schemas/LoginErrorResponse"
          description: Error response to a login request.
        default:
          description: Default response
      security:
      - {}
      summary: Submit Login Information
      tags:
      - Public
