
<h2>DomainDnssecRequest</h2>
<ul class="parameter">
  <li class="param-required-false">algorithm : List
    <br/>List of DNSSEC algorithm IDs for each record.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">digest_type : List
    <br/>List of digest type IDs for each record.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">digest : List
    <br/>List of hex digests for each record.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">key_tag : List
    <br/>List of key tag values corresponding to each record.
  </li>
</ul>
