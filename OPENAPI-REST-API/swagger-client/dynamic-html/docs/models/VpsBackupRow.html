
<h2>VpsBackupRow</h2>
<ul class="parameter">
  <li class="param-required-true">type : String
    <br/>Backup Type
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-true">service : Integer
    <br/>The service id such as vps  id.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-true">name : String
    <br/>The name of the backup.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-true">size : Integer
    <br/>Size of the file in bytes
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-true">date : Integer
    <br/>The creation date of the backup in a unix timestamp.
  </li>
</ul>
