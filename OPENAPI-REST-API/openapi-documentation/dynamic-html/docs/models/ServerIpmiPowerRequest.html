
<h2>ServerIpmiPowerRequest</h2>
<ul class="parameter">
  <li class="param-required-true">action : String
    <br/>The power action to send to the ipmi controller.
      <dl class="param-enum">
        <dt>Enum:
            <dd>cycle</dd>
            <dd>reset</dd>
            <dd>on</dd>
            <dd>off</dd>
            <dd>soft</dd>
        </dt>
      </dl>
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">asset : Integer
    <br/>The Asset ID
  </li>
</ul>
