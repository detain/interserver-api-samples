
<h2>BillingPrepayRequest</h2>
<ul class="parameter">
  <li class="param-required-false">module : String
    <br/>Module the prepay should be applied to (for example &#x60;default&#x60;).
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">amount : BigDecimal
    <br/>Amount to add to prepay balance. Minimum is $10.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">automaticUnderscoreuse : String
    <br/>Whether the prepay balance should be used automatically.
  </li>
</ul>
