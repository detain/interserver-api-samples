
<h2>SuccessTextResponse</h2>
<ul class="parameter">
  <li class="param-required-true">success : Boolean
    <br/>Indicates whether or not the command was successful or not.
  </li>
</ul>
<ul class="parameter">
  <li class="param-required-false">text : String
    <br/>Text associated with the response.

</ul>

  <li class="param-required-false">action : String
    <br/>Optional Action relating to the response.
  </li>
</ul>
